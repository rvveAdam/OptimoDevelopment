<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">   
    <title>Zadanie rekrutacyjne - Adam Kowalik</title>
</head>
<body>
    <div class="mainView">
        <div class="mainView__topbar"></div>
        <div class="mainView__separator"></div>
        <main class="mainView__content">
            <section class="mainView__diamonds">
                <div class="mainView__upperDiamond">
                    <div class="mainView__singleDiamond"></div>
                </div>
                <div class="mainView__lowerDiamond">
                    <div class="mainView__singleDiamond"></div>
                </div>                
            </section>
            <section class="mainView__symbols">
                <div class="mainView__lines">
                    <div class="mainView__line"></div>
                    <div class="mainView__line"></div>
                </div>                
                    <div class="mainView__oval"></div>
            </section>
            <section class="mainView__sidebar">
                <div class="mainView__rectangle">
                    <p class="mainView__rectangleText">ABC</p>
                </div>                
            </section>
        </main>
    </div>
</body>
</html>
